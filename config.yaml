server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

queue:
  data_dir: ./data/queue
  num_partitions: 3
  cache_duration: 2m
  cache_cleanup_interval: 1m
  max_message_size: 1048576  # 1MB
  segment_size: 104857600   # 100MB

database:
  host: postgres-service
  port: 5432
  user: postgres
  password: postgres
  db_name: telemetry
  max_open_conns: 25
  max_idle_conns: 5

streamer:
  csv_file_path: ./data/telemetry.csv
  batch_size: 100
  retry_max_attempts: 3
  retry_initial_delay: 1s
  retry_max_delay: 30s
  retry_multiplier: 2.0

collector:
  queue_endpoint: http://queue-service:8080
  consumer_group_id: default-collector
  batch_size: 100
  poll_interval: 1s
  retry_max_attempts: 3
  retry_delay: 1s

logging:
  level: info
  format: json
  output: stdout
