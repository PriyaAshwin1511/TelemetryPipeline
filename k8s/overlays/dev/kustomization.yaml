apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: telemetry-dev

resources:
  - ../../base

labels:
- pairs:
    environment: dev
  includeSelectors: true

patches:
  - path: collector-label-patch.yaml
  - path: streamer-label-patch.yaml
  - path: queue-label-patch.yaml
  - path: gateway-label-patch.yaml
